---
name: Sync MCP Schema and Create PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-mcp-schema:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/create-github-app-token@v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_GH_APP_ID }}
          private-key: ${{ secrets.BOT_GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version-file: "package.json"

      - name: Install Task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin v3.48.0

      - name: Download and convert MCP schema
        run: task mcp-schema-download

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: Sync MCP schema"
          title: "chore(mcp): sync MCP schema"
          body: |
            Automated update of MCP schema from modelcontextprotocol/modelcontextprotocol.

            This PR updates:
            - MCP schema from modelcontextprotocol/modelcontextprotocol
          branch: mcp-schema-sync
          base: main
          delete-branch: true
