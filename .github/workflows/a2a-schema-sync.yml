---
name: Sync A2A Schema and Create PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-a2a-schema:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.14.1"

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26.2"
          cache: true

      - name: Install task
        run: |
          curl -s https://taskfile.dev/install.sh | sh -s -- -b /usr/local/bin v3.48.0

      - name: Install buf
        run: |
          BUF_VERSION=1.68.4
          curl -sSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64" -o /usr/local/bin/buf
          sudo chmod +x /usr/local/bin/buf

      - name: Download and convert A2A schema
        run: task a2a-schema-download

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: Sync A2A schema"
          title: "chore: Sync A2A schema"
          body: |
            Automated update of A2A schema from google-a2a/A2A.

            This PR updates:
            - A2A schema from google-a2a/A2A
          branch: a2a-schema-sync
          base: main
          delete-branch: true
