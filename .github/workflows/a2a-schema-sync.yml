---
name: Sync A2A Schema and Create PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-a2a-schema:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/create-github-app-token@v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_GH_APP_ID }}
          private-key: ${{ secrets.BOT_GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26.2"
          cache: false

      - name: Install Task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin v3.48.0

      - name: Install buf
        run: |
          BUF_VERSION=1.68.4
          curl -sSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64" -o /usr/local/bin/buf
          sudo chmod +x /usr/local/bin/buf

      - name: Download and convert A2A schema
        run: task a2a-schema-download

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: Sync A2A schema"
          title: "chore(a2a): sync A2A schema"
          body: |
            Automated update of A2A schema from google-a2a/A2A.

            This PR updates:
            - A2A schema from google-a2a/A2A
          branch: a2a-schema-sync
          base: main
          delete-branch: true
