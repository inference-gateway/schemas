schema-version = "1.13.0"

[install]
go.pkg-path = "go"
go.version = "1.26.4"
bun.pkg-path = "bun"
bun.version = "^1.3.13"
bun.pkg-group = "bun"
protobuf.pkg-path = "protobuf"
protobuf.version = "^34.1"
go-task.pkg-path = "go-task"
go-task.version = "^3.48.0"
buf.pkg-path = "buf"
buf.version = "^1.71.0"
buf.pkg-group = "buf"
prettier.pkg-path = "prettier"
prettier.version = "^3.8.3"
prettier.pkg-group = "prettier"
markdownlint-cli.pkg-path = "markdownlint-cli"
markdownlint-cli.version = "0.49.0"
infer.flake = "github:inference-gateway/cli/v0.138.0"
claude-code.pkg-path = "claude-code"
claude-code.version = "^2.1.201"
claude-code.pkg-group = "claude-code"
codex.pkg-path = "codex"
codex.version = "^0.142.3"
codex.pkg-group = "codex"

[hook]
on-activate = '''
    bun install --frozen-lockfile
'''
