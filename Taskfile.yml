---
version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  mcp-schema-download:
    desc: "Download the latest MCP schema and convert to YAML"
    cmds:
      - bun install
      - curl -o mcp/mcp-schema.json https://raw.githubusercontent.com/modelcontextprotocol/modelcontextprotocol/refs/heads/main/schema/draft/schema.json
      - |
        echo "Converting JSON schema to YAML format"
        bun -e "
          const fs = require('fs');
          const yaml = require('js-yaml');
          const json = JSON.parse(fs.readFileSync('mcp/mcp-schema.json', 'utf8'));
          fs.writeFileSync('mcp/mcp-schema.yaml', yaml.dump(json, {lineWidth: -1}));
        "
      - task: format

  a2a-schema-download:
    desc: "Generate JSON schema from A2A proto and convert to YAML"
    cmds:
      - bun install
      - go install github.com/bufbuild/protoschema-plugins/cmd/protoc-gen-jsonschema@latest
      - mkdir -p a2a/tmp
      - cp a2a/a2a.proto a2a/tmp/a2a.proto
      - curl -o a2a/tmp/buf.yaml https://raw.githubusercontent.com/a2aproject/A2A/main/specification/buf.yaml
      - |
        echo "Converting proto to JSON schema using buf and protoc"
        cat > a2a/tmp/buf.gen.yaml <<EOF
        version: v2
        plugins:
          - local: protoc-gen-jsonschema
            out: ..
            opt: target=json-strict-bundle
        EOF
        cd a2a/tmp
        buf dep update
        PATH="$(go env GOPATH)/bin:$PATH" buf generate
        cd ../..
      - |
        echo "Processing bundled schema"
        bun scripts/process-bundle.js
      - |
        echo "Adding required fields from proto annotations"
        bun scripts/add-required-fields.js
      - rm -rf a2a/tmp
      - task: format

  format:
    desc: "Format all files with Prettier"
    cmds:
      - bun run format

  openapi:format:
    desc: "Format OpenAPI Spec"
    cmds:
      - bun run openapi:format

  lint:
    desc: "Lint all Markdown files"
    cmds:
      - bun run lint

  lint:fix:
    desc: "Lint and auto-fix all Markdown files"
    cmds:
      - bun run lint:fix

  openapi:lint:
    desc: "Lint OpenAPI spec"
    cmds:
      - bun run openapi:lint

  check-reachable:
    desc: "Verify streaming-payload schemas are reachable in openapi.yaml"
    cmds:
      - bun run check-reachable

  release:dry:
    desc: "Preview the next release locally (semantic-release dry run)"
    cmds:
      - bun install
      - bun run release:dry
